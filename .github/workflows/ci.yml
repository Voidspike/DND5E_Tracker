name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: dnd
          POSTGRES_PASSWORD: dnd
          POSTGRES_DB: dnd_visualizer
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://dnd:dnd@localhost:5432/dnd_visualizer
      JWT_SECRET: ci-test-secret

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npx prisma db push --schema=server/prisma/schema.prisma
        working-directory: server

      - name: Type check client
        run: npx tsc --noEmit
        working-directory: client

      - name: Type check server
        run: npx tsc --noEmit
        working-directory: server

      - name: Run server tests
        run: npm test
        working-directory: server
