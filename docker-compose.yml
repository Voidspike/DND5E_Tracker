services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: dnd
      POSTGRES_PASSWORD: dnd
      POSTGRES_DB: dnd_visualizer
    ports:
      - '127.0.0.1:15432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U dnd']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - '127.0.0.1:16379:6379'
    command: redis-server --requirepass dnd_redis_2026

  app:
    build: .
    ports:
      - '3001:3001'
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATABASE_URL=postgresql://dnd:dnd@postgres:5432/dnd_visualizer
      - REDIS_URL=redis://:dnd_redis_2026@redis:6379
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
