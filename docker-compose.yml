version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: dnd
      POSTGRES_PASSWORD: dnd
      POSTGRES_DB: dnd_visualizer
    ports:
      - '127.0.0.1:15432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - '127.0.0.1:16379:6379'
    command: redis-server --requirepass dnd_redis_2026

volumes:
  pgdata:
